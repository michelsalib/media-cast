appId: com.electron.app
productName: Media Cast
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!resources/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - '**/*'
win:
  executableName: media-cast
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # evermeet.cx only ships x86_64 ffmpeg; the universal merger sees identical bytes
  # in both arch slices and refuses to dedupe unless told the files are x64-only.
  x64ArchFiles: Contents/Resources/bin/**
  # Both the main executable (entitlements) and nested helpers (entitlementsInherit)
  # need com.apple.security.cs.disable-library-validation so ad-hoc signing + hardened
  # runtime don't reject the pre-signed Electron Framework's Team ID. See issue #2.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    # macOS 15 (Sequoia) gates all local-network access behind a privacy prompt.
    # Without this key the prompt has no rationale text and discovery silently fails.
    NSLocalNetworkUsageDescription: Media Cast discovers Chromecast and DLNA devices on your local network so it can stream video to them.
    # Bonjour browsing (Chromecast, _googlecast._tcp) returns NOTHING unless the
    # service types are declared here — even after the local-network prompt is granted.
    # SSDP/UPnP is raw multicast (not Bonjour) so it needs no entry, only the prompt above.
    # NOTE: the iOS com.apple.developer.networking.multicast entitlement does NOT exist on
    # macOS and must not be added — on macOS the local-network TCC prompt is the only gate.
    NSBonjourServices:
      - _googlecast._tcp
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: michelsalib
  repo: media-cast
  releaseType: release
